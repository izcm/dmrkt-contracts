name: Push ABIs

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  push-abis:
    name: Push ABIs to a2zb packages repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: forge build

      - name: Clone packages repo
        run: |
          git clone https://github.com/izcm/a2zb-packages.git
          cd a2zb-packages/abis/dmrkt
          git config user.name "a2zbCI"
          git config user.email "github@github.com"

      - name: Copy ABIs
        run: |
          cp -f out/OrderEngine.sol/OrderEngine.json a2zb-packages/abis/dmrkt/OrderEngine.json

      - name: Commit & Push ABI (only if OrderEngine ABI changed)
        run: |
          cd a2zb-packages

          if ! git diff --quiet abis/dmrkt/OrderEngine.json; then
            git add abis/dmrkt/OrderEngine.json
            git commit -m "Sync OrderEngine ABI"
            git push https://x-access-token:${{ secrets.ABI_PUSH_TOKEN }}@github.com/izcm/a2zb-packages.git HEAD:main
          else
            echo "OrderEngine ABI unchanged — skipping sync"
          fi
