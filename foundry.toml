[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]

remappings = [
    "orderbook/=contracts/orderbook",
    "test-helpers/=test/helpers",
    "mocks/=test/mocks",
    "nfts/=devtools/local-nfts",
    "dev/=devtools/seed",
    "@openzeppelin/=lib/openzeppelin-contracts/contracts/"
]

fs_permissions = [
    { access = "read-write", path = "data/" },
    { access = "read-write", path = "pipeline.toml" }
]

ignored_error_codes = [2424]

[lint]
exclude_lints = ["unaliased-plain-import", "asm-keccak256"]
